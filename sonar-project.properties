# ─────────────────────────────────────────────
#  SonarCloud Configuration
# ─────────────────────────────────────────────
#  Replace the placeholders below with your actual values from:
#  https://sonarcloud.io → Your Project → Information
# ─────────────────────────────────────────────

# ── Organization & Project ────────────────────
sonar.organization=surajgunagi7
sonar.projectKey=Surajgunagi7_ci-cd-node-docker
sonar.projectName=ci-cd-node-docker

# ── Source Configuration ──────────────────────
sonar.sources=.
sonar.inclusions=app.js
sonar.tests=.
sonar.test.inclusions=**/*.test.js

# ── Exclusions ────────────────────────────────
sonar.exclusions=node_modules/**,coverage/**,*.config.js

# ── Coverage Report (Jest lcov output) ────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info
