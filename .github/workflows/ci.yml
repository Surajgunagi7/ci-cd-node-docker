# ─────────────────────────────────────────────
#  CI/CD Pipeline — GitHub Actions
# ─────────────────────────────────────────────
#  Multi-stage pipeline with:
#   • ESLint static analysis
#   • Jest unit tests + code coverage
#   • npm audit security scanning
#   • SonarCloud code quality analysis
#   • Hadolint Dockerfile linting + Docker build
# ─────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════
  #  Stage 1: Lint — Static Code Analysis
  # ═══════════════════════════════════════════
  lint:
    name: 🔍 ESLint Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ═══════════════════════════════════════════
  #  Stage 2: Test — Unit Tests + Code Coverage
  # ═══════════════════════════════════════════
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      # Upload coverage report as artifact (like JaCoCo reports)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ═══════════════════════════════════════════
  #  Stage 3: Security — Dependency Audit
  # ═══════════════════════════════════════════
  security:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Check for known vulnerabilities
        run: |
          echo "──────────────────────────────────"
          echo "  Security audit complete"
          echo "──────────────────────────────────"
          npm audit --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30

  # ═══════════════════════════════════════════
  #  Stage 4: SonarCloud — Code Quality Gate
  # ═══════════════════════════════════════════
  sonarcloud:
    name: 📊 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate blame info

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage for SonarCloud
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ═══════════════════════════════════════════
  #  Stage 5: Docker — Hadolint + Build
  # ═══════════════════════════════════════════
  docker:
    name: 🐳 Dockerfile Lint & Build
    runs-on: ubuntu-latest
    needs: [lint, test, security, sonarcloud]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Lint Dockerfile with Hadolint (best practices checker)
      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # Build the Docker image
      - name: Build Docker image
        run: docker build -t ci-cd-node-docker:${{ github.sha }} .

      # Tag as latest
      - name: Tag Docker image
        run: docker tag ci-cd-node-docker:${{ github.sha }} ci-cd-node-docker:latest

      # Verify the images exist
      - name: Verify Docker images
        run: |
          echo "──────────────────────────────────"
          echo "  Docker images built successfully"
          echo "──────────────────────────────────"
          docker images ci-cd-node-docker

      # ── Pipeline complete ────────────────
      - name: Pipeline succeeded ✅
        run: echo "✅ Full CI/CD Pipeline completed successfully!"
