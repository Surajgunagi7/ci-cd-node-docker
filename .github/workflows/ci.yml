# ─────────────────────────────────────────────
#  CI/CD Pipeline — GitHub Actions
# ─────────────────────────────────────────────
#  Triggers on every push to the main branch.
#  Steps: checkout → setup Node → install → test → Docker build → done.

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build, Test & Dockerize
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ──────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js environment ─────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      # ── 3. Install dependencies ──────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Run tests ────────────────────────
      - name: Run tests
        run: npm test

      # ── 5. Build Docker image ───────────────
      - name: Build Docker image
        run: docker build -t ci-cd-node-docker:latest .

      # ── 6. Verify Docker image ──────────────
      - name: Verify Docker image
        run: docker images ci-cd-node-docker:latest

      # ── 7. Pipeline complete ────────────────
      - name: Pipeline succeeded
        run: echo "✅ CI/CD Pipeline completed successfully!"
